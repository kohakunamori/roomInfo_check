# Build & publish container images to GHCR.
#
# - roominfo      (Dockerfile target: runtime) → linux/amd64 + linux/arm64
# - roominfo-auth (Dockerfile target: auth)    → linux/amd64 only
#   (auth image pulls Chromium/noVNC; arm64 under QEMU is impractically slow
#    and the on-demand auth container is typically run on x86 NAS/servers)
#
# Tags: branch name, vX.Y.Z / X.Y semver, short sha, latest on default branch.
# PRs run the full build as a check but never push.
name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python syntax check
        run: python -m compileall -q .

      - name: JS syntax check
        run: node --check static/dashboard.js

      - name: Compose file check
        run: |
          cp .env.example .env
          docker compose config -q
          docker compose --profile auth config -q

  build:
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: runtime
            image: roominfo
            platforms: linux/amd64,linux/arm64
          - target: auth
            image: roominfo-auth
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires lowercase repository names
      - name: Compute image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
